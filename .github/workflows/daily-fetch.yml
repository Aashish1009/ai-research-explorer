name: Daily Paper Fetch

on:
  schedule:
    - cron: "0 6 * * *"   # every day at 6 AM UTC
  workflow_dispatch:        # also lets you run it manually from GitHub

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger daily ingest
        run: |
          curl -f -X GET "${{ secrets.APP_URL }}/api/daily" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            --max-time 300
